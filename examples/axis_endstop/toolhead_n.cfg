# Example: Per-tool axis endstop config for each toolhead.
#
# Place [tool_axis_endstop Tn] in the same file as [tool Tn]
# (e.g. tool_0.cfg, tool_1.cfg).  The tool number is inferred
# from the section name suffix ("T0" -> 0), or can be set
# explicitly with tool: 0.
#
# Both x_pin and y_pin are optional — define only the axes you
# need.  If an axis is not defined for a tool, the router falls
# back to the default (from the unnamed [tool_axis_endstop]
# section, or to the first registered tool's pin).

# ===================================================================
# Tool 0 — inherits x_pin from this section
# ===================================================================

[tool_axis_endstop T0]
tool: 0
x_pin: tool_0:PB8
# y_pin: tool_0:PB8   # uncomment if T0 has a separate Y endstop

[tool T0]
tool_number: 0
extruder: extruder
fan: T0_partfan
tool_probe: tool_probe T0
detection_pin: tool_0:PB6
gcode_x_offset: 0
gcode_y_offset: 0
gcode_z_offset: 0

[tool_probe T0]
pin: tool_0:PB8
tool: 0
speed: 5.0
samples: 3
samples_result: median
sample_retract_dist: 2.0
samples_tolerance: 0.02
samples_tolerance_retries: 3

# ===================================================================
# Tool 1 — overrides x_pin from T0
# ===================================================================

[tool_axis_endstop T1]
tool: 1
x_pin: tool_1:PB8
# y_pin: tool_1:PB8   # uncomment if T1 has a separate Y endstop

[tool T1]
tool_number: 1
extruder: extruder1
fan: T1_partfan
tool_probe: tool_probe T1
detection_pin: tool_1:PB6
gcode_x_offset: 0.631250
gcode_y_offset: -0.265625
gcode_z_offset: -0.366250

[tool_probe T1]
pin: tool_1:PB8
tool: 1
speed: 5.0
samples: 3
samples_result: median
sample_retract_dist: 2.0
samples_tolerance: 0.02
samples_tolerance_retries: 3
