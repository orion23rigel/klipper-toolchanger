# Example: Per-tool axis endstop config for each toolhead.
#
# Place [tool Tn] with x_endstop_pin / y_endstop_pin parameters.
# The tool number comes from tool_number: N.

# ===================================================================
# Tool 0
# ===================================================================

[tool T0]
tool_number: 0
x_endstop_pin: tool_0:PB8
# y_endstop_pin: tool_0:PB8   # uncomment if T0 has a separate Y endstop
extruder: extruder
fan: T0_partfan
tool_probe: tool_probe T0
detection_pin: tool_0:PB6
gcode_x_offset: 0
gcode_y_offset: 0
gcode_z_offset: 0

[tool_probe T0]
pin: tool_0:PB8
speed: 5.0
samples: 3
samples_result: median
sample_retract_dist: 2.0
samples_tolerance: 0.02
samples_tolerance_retries: 3

# ===================================================================
# Tool 1
# ===================================================================

[tool T1]
tool_number: 1
x_endstop_pin: tool_1:PB8
# y_endstop_pin: tool_1:PB8   # uncomment if T1 has a separate Y endstop
extruder: extruder1
fan: T1_partfan
tool_probe: tool_probe T1
detection_pin: tool_1:PB6
gcode_x_offset: 0.631250
gcode_y_offset: -0.265625
gcode_z_offset: -0.366250

[tool_probe T1]
pin: tool_1:PB8
speed: 5.0
samples: 3
samples_result: median
sample_retract_dist: 2.0
samples_tolerance: 0.02
samples_tolerance_retries: 3
