# Example: Homing override for a toolchanger with per-tool X endstops.
#
# With per-tool X endstop routing, G28 X automatically uses the
# active tool's endstop — no special handling needed in the
# homing override.  The router switches to the correct endstop
# when the tool is selected.

[gcode_macro _HOME_X]
gcode:
    {% set homing_move_speed = 175 %}
    # Home X — automatically routes to active tool's endstop
    G28 X
    # Move away
    G90
    G0 X175 F{homing_move_speed}

[gcode_macro _HOME_Y]
gcode:
    {% set homing_move_speed = 175 %}
    G28 Y
    G90
    G0 Y175 F{homing_move_speed}

[gcode_macro _HOME_Z]
gcode:
    {% set homing_move_speed = 200 %}
    G90
    G0 X175 Y175 F{homing_move_speed}
    G28 Z
    ADJUST_Z_AFTER_TOOL_NOZZLE_HOME

[homing_override]
axes: xyz
gcode:
    G90
    SET_GCODE_OFFSET X=0.0 Y=0.0 Z=0.0

    {% set home_all = 'X' not in params and 'Y' not in params and 'Z' not in params %}

    # Home Y first (gantry-mounted or sensorless)
    {% if home_all or 'Y' in params %}
        _HOME_Y
    {% endif %}

    # Initialize toolchanger and detect active tool for Z
    {% if home_all or 'Z' in params %}
        INITIALIZE_TOOLCHANGER
        STOP_TOOL_PROBE_CRASH_DETECTION
    {% endif %}

    # Home X — uses active tool's endstop via toolchanger_x router
    {% if home_all or 'X' in params %}
        _HOME_X
    {% endif %}

    # Home Z — uses active tool's probe via tool_probe_endstop router
    {% if home_all or 'Z' in params %}
        {% if homed_x == 0 %}
            _HOME_X
        {% endif %}
        {% if homed_y == 0 %}
            _HOME_Y
        {% endif %}
        _HOME_Z
    {% endif %}

    M400
    G90
    G0 X175 Y175 F200
    G0 Z40 F1000
