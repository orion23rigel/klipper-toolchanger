# Example: Per-tool X/Y endstop routing for a toolchanger setup.
#
# This demonstrates the minimal config changes needed to enable
# per-tool X endstop routing.  Y endstop routing follows the same
# pattern but is optional — most setups keep Y global (sensorless
# or gantry-mounted).
#
# The three changes are:
#   1. printer.cfg [stepper_x]: change endstop_pin to the virtual pin
#   2. Each tool cfg: add [tool_axis_endstop Tn] with x_pin
#   3. (Optional) [tool_axis_endstop] unnamed section for global defaults

[stepper_x]
# Change this line from the old hardcoded pin:
#   endstop_pin: tool_0:PB8
# To the virtual pin:
endstop_pin: toolchanger_x:x_virtual_endstop
position_min: -1.0
position_endstop: 347
position_max: 348
homing_speed: 130
homing_retract_dist: 5
second_homing_speed: 10
homing_positive_dir: true

[stepper_y]
# Y stays global — no change needed.
# If you have per-tool Y endstops, also change to:
#   endstop_pin: toolchanger_y:y_virtual_endstop
endstop_pin: MOT4_DIAG
position_min: -4
position_endstop: 355
position_max: 357

[stepper_z]
# Z stays as-is — per-tool probe routing already works via
# tool_probe_endstop.py.  No changes needed.
endstop_pin: probe:z_virtual_endstop
